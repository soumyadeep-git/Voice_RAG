# Question types:
#   answerable  - answer is supported by one or more sources (incl. multi-source synthesis)
#   conflict    - two sources contradict each other about the SAME fact; must be surfaced
#   unanswerable- not covered by any source; must be refused ("I don't know")

- id: q1
  question: Under the GDPR, can a child under 16 consent to data processing on their own?
  type: answerable
  expect_sources: [gdpr_consent_and_childrens_data.md]
  expect_keywords: ["16", "parental"]

- id: q2
  question: What is the maximum GDPR fine for breaching the basic principles of consent?
  type: answerable
  expect_sources: [gdpr_erasure_breach_and_fines.md]
  expect_keywords: ["20", "4%"]

- id: q3
  question: How quickly must a personal data breach be reported to the supervisory authority under the GDPR?
  type: answerable
  expect_sources: [gdpr_erasure_breach_and_fines.md]
  expect_keywords: ["72"]

- id: q4
  question: What rights does the CCPA give California consumers?
  type: answerable
  expect_sources: [ccpa_consumer_rights.md]
  expect_keywords: ["opt-out", "delete", "know"]

- id: q5
  question: What annual revenue makes a business subject to the CCPA?
  type: answerable
  expect_sources: [ccpa_scope_and_enforcement.md]
  expect_keywords: ["25"]

- id: q6
  question: Do the GDPR and the CCPA use an opt-in or an opt-out model for using personal data?
  type: answerable
  expect_sources: [gdpr_consent_and_childrens_data.md, ccpa_consumer_rights.md]
  expect_keywords: ["opt-in", "opt-out"]

- id: q7
  question: How do the penalties for violations compare between the GDPR and the CCPA?
  type: answerable
  expect_sources: [gdpr_erasure_breach_and_fines.md, ccpa_scope_and_enforcement.md]
  expect_keywords: ["20", "2,500", "7,500"]

- id: q8
  question: How many consumers must a business handle annually to fall under the CCPA?
  type: conflict
  expect_sources: [ccpa_original_2018.md, ccpa_scope_and_enforcement.md]
  expect_keywords: ["50,000", "100,000"]

- id: q9
  question: Has the CCPA's consumer-count threshold for covered businesses changed, and what are the two figures?
  type: conflict
  expect_sources: [ccpa_original_2018.md, ccpa_scope_and_enforcement.md]
  expect_keywords: ["50,000", "100,000"]

